<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

<div id="app"></div>

  <div class="panel" id="panel">
    <div class="row"><label>Number of images</label><input id="uiCount" class="num" type="number" min="1" max="64" step="1" value="6"></div>
    <div class="row"><label>Edge curvature <span class="sub">(curve)</span></label><input id="uiCurve" type="range" min="0" max="300" step="0.1" value="12"></div>
    <div class="row"><label>Curve Freq <span class="sub">(edge degree)</span></label><input id="uiCurveFreq" type="range" min="0.5" max="8" step="0.05" value="2"></div>
    <div class="row"><label>Auto speed <span class="sub">(units/s)</span></label><input id="uiSpeed" type="range" min="0" max="0.6" step="0.01" value="0.14"></div>
    <div class="row"><label>Gap between</label><input id="uiGap" type="range" min="0" max="0.4" step="0.005" value="0.10"></div>
    <div class="row"><label>Card height</label><input id="uiHeight" type="range" min="0.05" max="0.95" step="0.01" value="0.62"></div>
    <div class="row"><label>Image Radius <span class="sub">(corner radius)</span></label><input id="uiRadius" type="range" min="0" max="0.5" step="0.01" value="0"></div>
    <div class="row"><label>Stager <span class="sub">(wave)</span></label><input id="uiStager" type="range" min="0" max="2" step="0.01" value="0"></div>
    <div class="hr"></div>
    <div class="row"><label>Rotate Render <span class="sub">(deg)</span></label><input id="uiRotRender" type="range" min="-180" max="180" step="5" value="0"></div>
    <div class="row"><label>Rotate Texture <span class="sub">(deg)</span></label><input id="uiRotTexture" type="range" min="-180" max="180" step="5" value="0"></div>
    <div class="hr"></div>
    <div class="row"><label>Drag enabled</label><input id="uiDrag" type="checkbox" checked></div>
    <div class="row"><label>Invert Drag <span class="sub">(vertical gesture)</span></label><input id="uiInvertDrag" type="checkbox"></div>
    <div class="row"><label>Drag inertia</label><input id="uiInertia" type="range" min="0.80" max="0.995" step="0.005" value="0.94"></div>
    <div class="hr"></div>
    <div class="row"><label>Autoscroll</label><input id="uiAuto" type="checkbox" checked></div>
    <div class="row"><label>Reverse</label><input id="uiReverse" type="checkbox"></div>
    <div class="row"><label>Pause on hover</label><input id="uiHoverPause" type="checkbox" checked></div>
    <div class="hr"></div>
    <div class="row"><label>Load images</label><div><button id="btnFolder" class="btn">Folder…</button><button id="btnFiles" class="btn">Files…</button></div></div>
    <div class="files-note">Local only. No upload. Order by path/name.</div>
    <div class="hr"></div>
    <div class="muted">Tip: hold <span class="kbd">Alt</span> on sliders for fine tuning.</div>
    <div class="row"><label>Hide controls</label><button id="hideBtn" class="btn">Hide Panel</button></div>
  </div>

  <button id="showBtn" hidden>Show Panel</button>

  <input id="pickFolder" type="file" style="display:none" webkitdirectory directory multiple accept="image/*">
  <input id="pickFiles"  type="file" style="display:none" multiple accept="image/*">
